function fmtDate(d){ const mm=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0"); return mm+"/"+dd+"/"+d.getFullYear(); }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function computeFVI({incomeRange,hasDependents,isSoleEarner,painScore,psychScore}){
  const dep=hasDependents==="yes", sole=isSoleEarner==="yes";
  const unknown=hasDependents==="prefer"||isSoleEarner==="prefer";
  const u30=incomeRange==="under30", u50=(incomeRange==="under30"||incomeRange==="30to50");
  const uunk=!incomeRange||incomeRange==="prefer";
  const pain=painScore||5, psych=psychScore||5;
  const sev=pain<=2||psych<=2, mod=pain<=3||psych<=3;
  if(u30&&dep) return "High"; if(sole&&dep) return "High"; if(u50&&dep&&sole) return "High";
  if(sev&&(dep||sole||u50)) return "High";
  if(u50&&!dep) return "Moderate"; if(dep&&!sole) return "Moderate"; if(sole&&!dep) return "Moderate";
  if(uunk&&(dep||sole||unknown)) return "Moderate"; if(mod&&(dep||sole||u50)) return "Moderate";
  return "Low";
}

function buildInterp({fciScore,primaryDomains,fvi,painScore,psychScore}){
  const prim=primaryDomains.join(" and ");
  const opening="The Functional Capacity Index Analysis provides a structured snapshot of the client's current functional stability across the four domains of the 4Ps of Wellness: Physical, Psychological, Psychosocial, and Professional.";
  const fciP={
    5:"Based on the information entered, the client's current Functional Capacity Index indicates stable functional status, with no domain currently reflecting significant instability. At the time of analysis, the client appears able to maintain functional capacity across the assessed domains without substantial disruption to normal activity or role expectations.",
    4:"Based on the information entered, the client's current Functional Capacity Index indicates mild disruption in functional stability, with the primary area of instability identified in the "+prim+" domain. This may suggest emerging difficulty in maintaining full stability across all areas of functioning, although the client may still retain substantial capacity in daily or occupational roles.",
    3:"Based on the information entered, the client's current Functional Capacity Index indicates moderate disruption in functional stability, with the primary area of instability identified in the "+prim+" domain. This may suggest noticeable difficulty sustaining normal activity, role expectations, or occupational functioning during the current stage of recovery.",
    2:"Based on the information entered, the client's current Functional Capacity Index indicates significant disruption in functional stability, with the primary area of instability identified in the "+prim+" domain. This may suggest substantial limitation in the client's ability to maintain normal activity, work responsibilities, or consistent day-to-day functioning during the current stage of recovery.",
    1:"Based on the information entered, the client's current Functional Capacity Index indicates severe disruption in functional stability, with the primary area of instability identified in the "+prim+" domain. This may suggest profound limitation in the client's ability to sustain normal activity, occupational functioning, or other structured life responsibilities at the time of analysis."
  };
  const fviP={
    Low:"Current vulnerability indicators do not suggest elevated external pressure likely to destabilize recovery trajectory at this time. Continued monitoring may still be appropriate if work status, pain levels, or psychosocial stressors change.",
    Moderate:"Current vulnerability indicators suggest moderate external pressure that may affect recovery stability or increase the likelihood of functional strain during the course of the case. Monitoring may be beneficial if work demands, financial pressures, or symptom severity increase.",
    High:"Current vulnerability indicators suggest elevated external pressure that may affect recovery stability or increase the likelihood of premature return to work, reinjury, or disruption to recovery trajectory. This is particularly important when role demands, financial pressures, and ongoing symptoms are present."
  };
  const showSym=(painScore!==null&&painScore<=2)||(psychScore!==null&&psychScore<=2);
  const symP="The presence of elevated pain and/or psychological stress may further affect the client's ability to maintain consistent functional stability. When these factors occur alongside employment or financial pressures, there may be increased risk of premature return to work or disruption to recovery trajectory.";
  const docP="Documenting these functional changes over time may help illustrate how an injury has affected a client's ability to maintain normal activity, employment, and overall stability during the course of a case.";
  const closing="This interpretation reflects the client's status at the time the analysis was completed and should be considered within the broader context of medical evaluation, treatment progress, and ongoing case developments.";
  const paras=[opening, fciP[fciScore]||fciP[1], fviP[fvi]||fviP["Low"]];
  if(showSym) paras.push(symP);
  paras.push(docP,closing);
  return paras;
}

let _fciCompleteNotified = false;

function notifyComplete() {
  const assessmentData = {
    instrument: 'FCI',
    fciScore: Math.min(...Object.values(S.scores).filter(Boolean)),
    scores: S.scores,
    vulnScores: S.vulnScores,

    completedAt: new Date().toISOString()
  };

  const msg = {
    type: 'ASSESSMENT_COMPLETE',
    assessmentId: assessmentId,
    caseType: caseType,
    tool: 'FCI',
    data: assessmentData
  };

  try { if (window.opener && !window.opener.closed) window.opener.postMessage(msg, '*'); } catch(e) {}
  try { if (window.parent && window.parent !== window) window.parent.postMessage(msg, '*'); } catch(e) {}
}

function render(){
  const app=document.getElementById("app");
  const sc=S.screen;
  let html="";

  if(sc==="intro") html=screenIntro();
  else if(sc==="context") html=screenContext();
  else if(sc==="vuln-intro") html=screenVulnIntro();
  else if(sc==="vuln") html=screenVuln();
  else if(sc.startsWith("domain-")) html=screenDomain(parseInt(sc.split("-")[1]));
  else if(sc==="complete") html=screenComplete();

  app.innerHTML=html;
  bindEvents();

  window.scrollTo(0,0);
}

function bindEvents(){
  const sc=S.screen;

  // Live input sync helpers
  function live(id,fn){ const el=document.getElementById(id); if(el) el.addEventListener(el.tagName==="SELECT"?"change":"input",fn); }

  if(sc==="intro"){
    bind("intro-back",()=>{ /* portal is the entry point — no back from intro */ });
    bind("intro-next",()=>setState({screen:"context"}));
  }
  if(sc==="context"){
    live("ctx-ref",e=>{ S.ctx.clientRef=e.target.value; });
    live("ctx-doi",e=>{ S.ctx.doi=e.target.value; });
    live("ctx-injury",e=>{ S.ctx.injuryType=e.target.value; });
    bind("ctx-back",()=>setState({screen:"intro"}));
    bind("ctx-next",()=>setState({screen:"vuln-intro"}));
  }
  if(sc==="vuln-intro"){
    bind("vi-back",()=>setState({screen:"context"}));
    bind("vi-next",()=>setState({screen:"vuln"}));
  }
  if(sc==="vuln"){
    live("fvi-income",e=>{ S.fviFields.incomeRange=e.target.value; render(); });
    live("fvi-dep",e=>{ S.fviFields.hasDependents=e.target.value; render(); });
    live("fvi-sole",e=>{ S.fviFields.isSoleEarner=e.target.value; render(); });
    document.querySelectorAll(".hscale-btn").forEach(btn=>{
      btn.addEventListener("click",()=>{
        const ind=btn.dataset.ind, sc2=parseInt(btn.dataset.sc);
        S.vulnScores={...S.vulnScores,[ind]:sc2};
        render();
      });
    });
    bind("vuln-back",()=>setState({screen:"vuln-intro"}));
    bind("vuln-next",()=>setState({screen:"domain-0"}));
  }
  if(sc.startsWith("domain-")){
    const idx=parseInt(sc.split("-")[1]);
    const dom=DOMAINS[idx];
    document.querySelectorAll(".level-card").forEach(card=>{
      card.addEventListener("click",()=>{
        S.scores={...S.scores,[card.dataset.domain]:parseInt(card.dataset.score)};
        render();
      });
    });
    bind("dom-back",()=>{ if(idx===0) setState({screen:"vuln"}); else setState({screen:"domain-"+(idx-1)}); });
    bind("dom-next",()=>{
      if(idx<DOMAINS.length-1) setState({screen:"domain-"+(idx+1)});
      else setState({screen:"complete"});
    });
  }
  if(sc==="complete"){
    if(!_fciCompleteNotified){
      _fciCompleteNotified=true;
      notifyComplete();
    }
    document.getElementById('fci-btn-next')?.addEventListener('click', function () {
      var msg = { type: 'GO_TO_NEXT_ASSESSMENT', instrument: 'FCI', nextInstrument: 'RRF', caseType: caseType };
      try { if (window.opener && !window.opener.closed) window.opener.postMessage(msg, '*'); } catch (e1) {}
      try { if (window.parent && window.parent !== window) window.parent.postMessage(msg, '*'); } catch (e2) {}
    });
    document.getElementById('fci-btn-dashboard')?.addEventListener('click', function (e) {
      var ret = { type: 'FCI_RETURN_TO_DASHBOARD', instrument: 'FCI', portalUrl: PORTAL_URL };
      if (window.opener && !window.opener.closed) {
        e.preventDefault();
        try { window.opener.postMessage(ret, '*'); } catch (x) {}
        window.opener.focus();
        window.close();
        return;
      }
      try {
        if (window.parent && window.parent !== window) window.parent.postMessage(ret, '*');
      } catch (x) {}
      /* iframe: do NOT preventDefault — target="_parent" reloads Case Clarity tab */
    });
  }
}
